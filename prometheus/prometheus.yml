global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
      
  - job_name: 'surrealdb'
    metrics_path: '/health'
    static_configs:
      # Scraping SurrealDB internal health endpoint
      - targets: ['surrealdb:8000']

